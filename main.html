<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GitHub Issues Tracker - Dashboard</title>
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            'brand-purple': '#5811FF',
                            'open-green': '#22C55E',
                            'closed-purple': '#A855F7',
                        },
                    },
                },
            };
        </script>
        <style>
            .active-tab {
                background-color: #5811ff !important;
                color: white !important;
                border-color: #5811ff !important;
            }
            #issue-container {
                transition: all 0.3s ease-in-out;
            }
        </style>
    </head>
    <body class="bg-gray-50 min-h-screen pb-12">
        <nav
            class="bg-white border-b sticky top-0 z-50 px-4 md:px-6 py-3 flex flex-col md:flex-row items-center justify-between gap-4"
        >
            <div class="flex items-center gap-2 w-full md:w-auto">
                <a
                    href="https://github.com/mdalaminmiah"
                    target="_blank"
                    class="github-link"
                >
                    <img
                        src="./assets/github-logo.png"
                        alt="GitHub Logo"
                        width="32"
                        height="32"
                    />
                </a>
                <span class="font-bold text-lg text-gray-800 tracking-tight">
                    GitHub Issues Tracker
                </span>
            </div>

            <div
                class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto"
            >
                <input
                    id="search-input"
                    type="text"
                    placeholder="Search issues..."
                    class="input input-bordered w-full sm:w-[280px] rounded-lg text-sm focus:border-brand-purple"
                />

                <div class="flex gap-2 w-full sm:w-auto">
                    <button
                        onclick="handleSearch()"
                        class="btn bg-brand-purple text-white border-none flex-1 sm:flex-none hover:opacity-90"
                    >
                        Search
                    </button>
                    <button
                        class="btn bg-brand-purple text-white border-none flex-1 sm:flex-none hover:opacity-90"
                    >
                        + New Issue
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-[1440px] mx-auto p-4 md:p-6">
            <div
                class="bg-white border rounded-xl mb-8 shadow-sm overflow-hidden"
            >
                <div class="flex flex-wrap border-b bg-gray-50/50 p-2 gap-2">
                    <button
                        onclick="filterIssues('all')"
                        id="tab-all"
                        class="px-6 py-2 text-sm font-bold border rounded-lg bg-white active-tab flex-1 sm:flex-none"
                    >
                        All
                    </button>
                    <button
                        onclick="filterIssues('open')"
                        id="tab-open"
                        class="px-6 py-2 text-sm font-bold border rounded-lg bg-white text-gray-600 flex-1 sm:flex-none"
                    >
                        Open
                    </button>
                    <button
                        onclick="filterIssues('closed')"
                        id="tab-closed"
                        class="px-6 py-2 text-sm font-bold border rounded-lg bg-white text-gray-600 flex-1 sm:flex-none"
                    >
                        Closed
                    </button>
                </div>

                <div
                    class="flex flex-col md:flex-row items-center justify-between px-6 py-6 gap-4"
                >
                    <div
                        class="flex items-center gap-4 text-center md:text-left flex-col md:flex-row"
                    >
                        <div
                            class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-brand-purple"
                        >
                            <img
                                src="./assets/Aperture.png"
                                alt="Aperture icon"
                                width="32"
                                height="32"
                            />
                        </div>
                        <div>
                            <h2
                                id="issue-count"
                                class="text-2xl font-black text-gray-800"
                            >
                                0 Issues
                            </h2>
                            <p
                                class="text-xs text-gray-400 font-medium uppercase tracking-wider"
                            >
                                Project Management Dashboard
                            </p>
                        </div>
                    </div>
                    <div
                        class="flex items-center gap-6 text-[10px] font-black uppercase tracking-widest text-gray-400"
                    >
                        <span class="flex items-center gap-2">
                            <span
                                class="w-3 h-3 rounded-full bg-open-green"
                            ></span>
                            Open
                        </span>
                        <span class="flex items-center gap-2">
                            <span
                                class="w-3 h-3 rounded-full bg-closed-purple"
                            ></span>
                            Closed
                        </span>
                    </div>
                </div>
            </div>

            <div
                id="issue-container"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
            ></div>
        </main>

        <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box max-w-2xl p-8 rounded-t-3xl sm:rounded-3xl">
                <form method="dialog">
                    <button
                        class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2"
                    >
                        ✕
                    </button>
                </form>

                <div class="mb-6">
                    <h4
                        class="text-gray-300 font-bold text-xs uppercase tracking-widest mb-2"
                    >
                        Issue Details
                    </h4>
                    <div id="modal-header"></div>
                </div>

                <div id="modal-tags" class="flex gap-2 mb-6"></div>

                <div class="mb-8">
                    <p
                        id="modal-desc"
                        class="text-gray-500 leading-relaxed text-sm"
                    ></p>
                </div>

                <div
                    class="bg-slate-50 rounded-2xl p-6 border border-slate-100 flex justify-between items-center mb-8"
                >
                    <div>
                        <p
                            class="text-[10px] font-black text-gray-400 uppercase tracking-wider mb-1"
                        >
                            Assignee:
                        </p>
                        <p
                            id="modal-author"
                            class="font-bold text-gray-800 text-sm"
                        ></p>
                    </div>
                    <div class="text-right">
                        <p
                            class="text-[10px] font-black text-gray-400 uppercase tracking-wider mb-1"
                        >
                            Priority:
                        </p>
                        <span
                            id="modal-priority"
                            class="text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase"
                        ></span>
                    </div>
                </div>

                <div class="modal-action">
                    <form method="dialog" class="w-full">
                        <button
                            class="btn bg-brand-purple text-white w-full rounded-xl border-none"
                        >
                            Close
                        </button>
                    </form>
                </div>
            </div>
            <form method="dialog" class="modal-backdrop">
                <button>close</button>
            </form>
        </dialog>

        <script src="./script/main.js"></script>
    </body>
</html>
