<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GitHub Issues Tracker - Login</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            'github-dark': '#24292f',
                            'brand-purple': '#5811FF',
                        },
                    },
                },
            };
        </script>
        <style>
            /* Strict No-Scroll Rules */
            html,
            body {
                height: 100%;
                margin: 0;
                overflow: hidden;
                background-color: #f8fafc;
            }
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 10px; /* Small safety gap for the very edges */
            }
        </style>
    </head>
    <body>
        <div
            class="bg-white px-8 py-6 rounded-2xl shadow-xl shadow-gray-200/50 w-full max-w-[440px] border border-gray-100 flex flex-col"
        >
            <div class="flex flex-col items-center mb-4">
                <a
                    href="https://github.com/mdalaminmiah"
                    target="_blank"
                    class="github-link"
                >
                    <img
                        src="./assets/github-logo.png"
                        alt="GitHub Logo"
                        width="32"
                        height="32"
                    />
                </a>
                <h1 class="text-xl font-bold text-gray-800 mt-2 tracking-tight">
                    GitHub Issues Tracker
                </h1>
                <p class="text-gray-400 text-[11px]">
                    Sign in to manage your issues
                </p>
            </div>

            <div class="space-y-3">
                <div>
                    <label
                        class="block text-[11px] font-semibold text-gray-700 mb-1"
                    >
                        Username
                    </label>
                    <input
                        type="text"
                        id="username"
                        placeholder="Enter Username"
                        class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-purple/10 focus:border-brand-purple transition-all text-sm"
                    />
                    <p class="text-[10px] text-brand-purple mt-1 font-medium">
                        Default: admin
                    </p>
                </div>

                <div>
                    <label
                        class="block text-[11px] font-semibold text-gray-700 mb-1"
                    >
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter Password"
                        class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-purple/10 focus:border-brand-purple transition-all text-sm"
                    />
                    <p class="text-[10px] text-brand-purple mt-1 font-medium">
                        Default: admin123
                    </p>
                </div>

                <button
                    id="login-btn"
                    class="w-full bg-brand-purple text-white py-3 rounded-xl font-bold text-sm hover:opacity-95 active:scale-[0.98] transition-all shadow-md mt-1"
                >
                    Sign In
                </button>

                <div class="flex items-center py-1">
                    <div class="grow border-t border-gray-100"></div>
                    <span
                        class="px-3 text-[9px] text-gray-400 font-bold uppercase tracking-widest"
                    >
                        OR
                    </span>
                    <div class="grow border-t border-gray-100"></div>
                </div>

                <div
                    class="bg-gray-50 rounded-xl py-3 px-2 text-center border border-gray-100"
                >
                    <p
                        class="text-[9px] text-gray-400 mb-1 uppercase font-bold"
                    >
                        Demo Credentials:
                    </p>
                    <div class="text-[13px] text-gray-700 leading-tight">
                        <p>
                            <span class="font-bold">Username:</span>
                            admin
                        </p>
                        <p>
                            <span class="font-bold">Password:</span>
                            admin123
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document
                .getElementById('login-btn')
                .addEventListener('click', () => {
                    const user = document.getElementById('username').value;
                    const pass = document.getElementById('password').value;
                    if (user === 'admin' && pass === 'admin123') {
                        window.location.href = 'main.html';
                    } else {
                        alert('Invalid Credentials!');
                    }
                });
        </script>
    </body>
</html>
